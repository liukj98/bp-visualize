<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BP 反向传播算法可视化</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <h1>BP 反向传播算法</h1>
        <span class="header-subtitle">交互式可视化演示</span>
      </div>
      <div class="header-right">
        <div class="tabs">
          <button class="tab-btn active" data-tab="visualize">可视化</button>
          <button class="tab-btn" data-tab="education">算法原理</button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Visualization Tab -->
      <div id="tab-visualize" class="tab-content active">
        <div class="layout">
          <!-- Left: Canvas + Chart -->
          <div class="canvas-area">
            <div class="canvas-header">
              <span id="phase-indicator" class="phase-indicator phase-idle">就绪</span>
              <span class="network-info">网络结构: 2-2-2 | 参考: Matt Mazur BP Tutorial</span>
            </div>
            <div class="canvas-wrapper" id="canvas-wrapper">
              <canvas id="network-canvas"></canvas>
            </div>
            <div class="chart-wrapper" id="chart-wrapper">
              <canvas id="chart-canvas"></canvas>
            </div>
          </div>

          <!-- Right: Controls + Formula -->
          <div class="sidebar">
            <!-- Controls -->
            <div class="panel control-panel">
              <h3>训练控制</h3>
              <div class="btn-group">
                <button id="btn-step" class="btn btn-primary">下一步 ▶</button>
                <button id="btn-skip" class="btn btn-skip" style="display:none;">跳过阶段 ⏭</button>
                <button id="btn-auto" class="btn btn-secondary">▶ 自动训练</button>
                <button id="btn-reset" class="btn btn-danger">↺ 重置</button>
              </div>

              <div class="btn-group">
                <input type="number" id="fast-iters" class="input-small" value="1000" min="1" max="100000" />
                <button id="btn-fast" class="btn btn-secondary">快速训练</button>
              </div>

              <div class="slider-group">
                <label>学习率 η = <span id="lr-value">0.50</span></label>
                <input type="range" id="lr-slider" min="0.01" max="2.0" step="0.01" value="0.5" />
              </div>

              <div class="slider-group">
                <label>动画速度 <span id="speed-value">500ms</span></label>
                <input type="range" id="speed-slider" min="10" max="2000" step="10" value="500" />
              </div>

              <div class="select-group">
                <label>激活函数</label>
                <select id="activation-select">
                  <option value="sigmoid" selected>Sigmoid</option>
                  <option value="relu">ReLU</option>
                </select>
              </div>
            </div>

            <!-- Info Panel -->
            <div class="panel info-panel-wrapper">
              <h3>训练信息</h3>
              <div id="info-panel">
                <div class="info-row"><span>迭代次数</span><strong>0</strong></div>
                <div class="info-row"><span>当前损失</span><strong>—</strong></div>
                <div class="info-row"><span>学习率</span><strong>0.5</strong></div>
                <div class="info-row"><span>激活函数</span><strong>sigmoid</strong></div>
              </div>
            </div>

            <!-- Formula Display -->
            <div class="panel formula-panel">
              <h3>公式推导</h3>
              <div id="formula-container"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Education Tab -->
      <div id="tab-education" class="tab-content">
        <div class="education-page" id="education-content">
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
