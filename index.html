<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BP 反向传播算法可视化</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <!-- Neural Network Logo -->
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Connection Lines -->
            <path d="M12 12L20 20M12 28L20 20M28 12L20 20M28 28L20 20" stroke="url(#grad1)" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
            <!-- Nodes -->
            <circle class="neural-node" cx="12" cy="12" r="4" fill="url(#grad1)"/>
            <circle class="neural-node" cx="28" cy="12" r="4" fill="url(#grad2)"/>
            <circle class="neural-node" cx="12" cy="28" r="4" fill="url(#grad2)"/>
            <circle class="neural-node" cx="28" cy="28" r="4" fill="url(#grad1)"/>
            <circle class="neural-node" cx="20" cy="20" r="5" fill="url(#grad3)"/>
            <!-- Gradient Definitions -->
            <defs>
              <radialGradient id="grad1" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#60a5fa"/>
                <stop offset="100%" stop-color="#3b82f6"/>
              </radialGradient>
              <radialGradient id="grad2" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#22d3ee"/>
                <stop offset="100%" stop-color="#06b6d4"/>
              </radialGradient>
              <radialGradient id="grad3" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#a78bfa"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </radialGradient>
            </defs>
          </svg>
        </div>
        <div>
          <h1>BP 反向传播算法</h1>
          <span class="header-subtitle">交互式可视化演示</span>
        </div>
      </div>
      
      <!-- Header Stats -->
      <div class="header-stats">
        <div class="stat-item">
          <span class="stat-value">3</span>
          <span class="stat-label">网络层数</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">2-2-1</span>
          <span class="stat-label">节点结构</span>
        </div>
        <div class="stat-item">
          <span class="stat-value">6</span>
          <span class="stat-label">参数总量</span>
        </div>
      </div>
      
      <div class="header-right">
        <div class="tabs">
          <button class="tab-btn active" data-tab="visualize"><span>📊 可视化</span></button>
          <button class="tab-btn" data-tab="education"><span>📚 算法原理</span></button>
          <button class="tab-btn" data-tab="faq"><span>💡 梯度下降</span></button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main">
      <!-- Visualization Tab -->
      <div id="tab-visualize" class="tab-content active">
        <div class="layout">
          <!-- Left: Canvas + Chart -->
          <div class="canvas-area">
            <div class="canvas-header">
              <span id="phase-indicator" class="phase-indicator phase-idle">就绪</span>
              <span class="network-info">网络结构: 2-2-1 | 纯线性网络（无激活函数、无偏置）</span>
            </div>
            <div class="canvas-wrapper" id="canvas-wrapper">
              <canvas id="network-canvas"></canvas>
            </div>
            <div class="chart-wrapper" id="chart-wrapper">
              <canvas id="chart-canvas"></canvas>
            </div>
          </div>

          <!-- Right: Controls + Formula -->
          <div class="sidebar">
            <!-- Controls -->
            <div class="panel control-panel">
              <h3>训练控制</h3>
              <div class="btn-group">
                <button id="btn-step" class="btn btn-primary">下一步 ▶</button>
                <button id="btn-skip" class="btn btn-skip" style="display:none;">跳过阶段 ⏭</button>
                <button id="btn-auto" class="btn btn-secondary">▶ 自动训练</button>
                <button id="btn-reset" class="btn btn-danger">↺ 重置</button>
              </div>

              <div class="btn-group">
                <input type="number" id="fast-iters" class="input-small" value="1000" min="1" max="100000" />
                <button id="btn-fast" class="btn btn-secondary">快速训练</button>
              </div>

              <div class="slider-group">
                <label>学习率 η = <span id="lr-value">0.10</span></label>
                <input type="range" id="lr-slider" min="0.01" max="2.0" step="0.01" value="0.1" />
              </div>

              <div class="slider-group">
                <label>动画速度 <span id="speed-value">500ms</span></label>
                <input type="range" id="speed-slider" min="10" max="2000" step="10" value="500" />
              </div>


            </div>

            <!-- Info Panel -->
            <div class="panel info-panel-wrapper">
              <h3>训练信息</h3>
              <div id="info-panel">
                <div class="info-row"><span>迭代次数</span><strong>0</strong></div>
                <div class="info-row"><span>当前损失</span><strong>—</strong></div>
                <div class="info-row"><span>学习率</span><strong>0.1</strong></div>
              </div>
            </div>

            <!-- Formula Display -->
            <div class="panel formula-panel" id="formula-panel">
              <h3>公式推导 <span class="formula-zoom-hint">点击放大 🔍</span></h3>
              <div id="formula-container"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Education Tab -->
      <div id="tab-education" class="tab-content">
        <div class="education-layout">
          <nav class="edu-sidebar" id="edu-sidebar"></nav>
          <div class="education-page" id="education-content"></div>
        </div>
      </div>

      <!-- FAQ Tab -->
      <div id="tab-faq" class="tab-content">
        <div class="education-layout">
          <nav class="edu-sidebar" id="faq-sidebar"></nav>
          <div class="education-page" id="faq-content"></div>
        </div>
      </div>
    </main>
  </div>

  <!-- Formula Zoom Modal -->
  <div id="formula-modal" class="formula-modal" style="display:none;">
    <div class="formula-modal-content">
      <div class="formula-modal-header">
        <h2>公式推导</h2>
        <button class="formula-modal-close" id="formula-modal-close">✕</button>
      </div>
      <div class="formula-modal-body" id="formula-modal-body"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
